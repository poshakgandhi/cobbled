# fly.toml app configuration file generated for cobbled on 2026-06-08T13:18:09+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cobbled'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_PATH = '/data/db.sqlite3'
  DEBUG = 'false'
  SOCIALACCOUNT_ONLY = 'true'

[[mounts]]
  source = 'gaia_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
